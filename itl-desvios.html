const YEARS = [2024, 2025, 2026, 2027, 2028];

};

// INC00101 = pérdida contractual | Lost = transitoria operativa
const SB_SNAPSHOT_DEFAULT = {
  client: "Southbay",
  date: "Mar 2026",
  lostThreshold: 1,  // % máximo INC00101 + Lost sobre stock total
  categories: [
    { name: "APP", stock: 450012, inc: 126,  lost: 376, incVal: 0, lostVal: 0 },
    { name: "EQP", stock: 199360, inc: 681,  lost: 266, incVal: 0, lostVal: 0 },
    { name: "FTW", stock: 884727, inc: 362,  lost: 359, incVal: 0, lostVal: 0 },
  ]
};
const fmt = n => (n != null && !isNaN(n)) ? Number(n).toLocaleString("es-AR") : "—";
const fmtN = n => fmt(n);
const fmtM = n => (n != null && !isNaN(n)) ? "$" + Math.abs(Number(n)).toLocaleString("es-AR", { minimumFractionDigits: 0, maximumFractionDigits: 0 }) : "—";
const fmtMS = n => { if (n == null || isNaN(n)) return "—"; const s = n < 0 ? "−" : n > 0 ? "+" : ""; return s + "$" + Math.abs(Number(n)).toLocaleString("es-AR", { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }; // signed
const fmtM2 = n => (n != null && !isNaN(n)) ? "$" + Math.abs(Number(n)).toLocaleString("es-AR", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : "—";
const abs = Math.abs;

async function ld(k, fb) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch { return fb; } }
async function sv(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) { console.error(e); } }

// ─── Charts ───
function MiniBar({ data, color, maxVal, height = 110, barWidth = 24, threshold, exceeds }) {
  const w = data.length * (barWidth + 5) + 10, mx = maxVal || Math.max(...data.map(d => d.value), 0.01);
  const tY = threshold != null ? height - (threshold / mx) * height : null;
  return (
    <svg width={w} height={height + 22} style={{ display: "block" }}>
      {tY != null && tY >= 0 && tY <= height && <>
        <line x1={0} y1={tY} x2={w} y2={tY} stroke="#f87171" strokeWidth="1.5" strokeDasharray="5 3" opacity={0.7} />
        <text x={w - 3} y={tY - 3} textAnchor="end" fontSize="8" fill="#f87171" fontFamily="'DM Mono',monospace" opacity={0.85}>Tol {threshold.toFixed(2)}%</text>
      </>}
      {data.map((d, i) => {
        const bh = (d.value / mx) * height, x = i * (barWidth + 5) + 5;
        const ex = exceeds ? exceeds[i] : (threshold != null && d.value > threshold && d.value > 0);
        return (<g key={i}>
          <rect x={x} y={height - bh} width={barWidth} height={bh} rx={3} fill={ex ? "#f87171" : color} opacity={ex ? .95 : .85} />
          {d.value > 0 && <text x={x + barWidth / 2} y={height - bh - 3} textAnchor="middle" fontSize="9" fill={ex ? "#f87171" : "#94a3b8"} fontWeight={ex ? 700 : 400} fontFamily="'DM Mono',monospace">{d.value.toFixed(2)}%</text>}
          <text x={x + barWidth / 2} y={height + 12} textAnchor="middle" fontSize="8" fill="#64748b" fontFamily="'DM Mono',monospace">{d.label}</text>
        </g>);
      })}
    </svg>
  );
}
function Spark({ values, color, width = 130, height = 32 }) {
  const v = values.filter(x => x != null); if (v.length < 2) return null;
  const mn = Math.min(...v), mx = Math.max(...v), rg = mx - mn || 1;
  return <svg width={width} height={height} style={{ display: "block" }}><polyline points={v.map((x, i) => `${(i / (v.length - 1)) * width},${height - ((x - mn) / rg) * (height - 4) - 2}`).join(" ")} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>;
}
function Badge({ value, threshold, small, nc, isValued, ajuste }) {
  if (threshold == null || threshold <= 0) return null;
  // For valorized: only exceeds if ajuste is negative AND nc > 0
  // For units: only exceeds if ajuste is negative AND value > threshold
  let ex;
  if (isValued) {
    ex = (nc || 0) > 0;
  } else if (ajuste !== undefined) {
    ex = ajuste < 0 && value > threshold;
  } else {
    ex = value > threshold;
  }
  return <span style={{ display: "inline-flex", alignItems: "center", padding: small ? "1px 5px" : "2px 7px", borderRadius: 5, fontSize: small ? 8 : 9, fontFamily: "'DM Mono',monospace", fontWeight: 600, background: ex ? "#f8717120" : "#34d39920", color: ex ? "#f87171" : "#34d399", marginLeft: 5 }}>{ex ? "⚠ EXCEDE" : "✓ OK"}</span>;
}

// ─── UI ───
function Pill({ children, active, onClick }) { return <button onClick={onClick} style={{ padding: "5px 13px", borderRadius: 20, border: active ? "2px solid #c084fc" : "1.5px solid #334155", background: active ? "#c084fc18" : "transparent", color: active ? "#c084fc" : "#94a3b8", fontSize: 12, fontFamily: "'DM Mono',monospace", cursor: "pointer", fontWeight: active ? 600 : 400 }}>{children}</button>; }
function IBtn({ onClick, children, danger }) { return <button onClick={onClick} style={{ background: "none", border: "none", cursor: "pointer", padding: 3, color: danger ? "#f87171" : "#64748b", fontSize: 15, lineHeight: 1 }}>{children}</button>; }
function Modal({ open, onClose, title, children, width }) {
  if (!open) return null;
  return <div style={{ position: "fixed", inset: 0, zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center" }} onClick={onClose}>
    <div style={{ position: "absolute", inset: 0, background: "rgba(2,6,23,.7)", backdropFilter: "blur(4px)" }} />
    <div onClick={e => e.stopPropagation()} style={{ position: "relative", background: "#0f172a", border: "1px solid #1e293b", borderRadius: 16, padding: "24px 28px", width: width || 520, maxWidth: "94vw", maxHeight: "88vh", overflowY: "auto", boxShadow: "0 20px 60px rgba(0,0,0,.5)" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
        <h3 style={{ margin: 0, color: "#e2e8f0", fontFamily: "'Space Grotesk',sans-serif", fontSize: 17, fontWeight: 600 }}>{title}</h3>
        <IBtn onClick={onClose}>✕</IBtn>
      </div>
      {children}
    </div>
  </div>;
}
function F({ label, value, onChange, type, placeholder, small, options, step, prefix, disabled }) {
  const bs = { background: "#1e293b", border: "1px solid #334155", borderRadius: 7, color: "#e2e8f0", padding: "7px 11px", fontSize: 12, fontFamily: "'DM Mono',monospace", width: "100%", boxSizing: "border-box", outline: "none" };
  return <div style={{ flex: small ? "0 0 auto" : 1, minWidth: small ? 80 : undefined }}>
    {label && <label style={{ display: "block", fontSize: 10, color: "#64748b", marginBottom: 3, fontFamily: "'DM Mono',monospace" }}>{label}</label>}
    {options ? <select value={value} onChange={e => onChange(e.target.value)} disabled={disabled} style={{ ...bs, cursor: "pointer" }}>{options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}</select>
      : <div style={{ position: "relative" }}>{prefix && <span style={{ position: "absolute", left: 9, top: "50%", transform: "translateY(-50%)", color: "#64748b", fontSize: 11 }}>{prefix}</span>}<input type={type || "text"} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} disabled={disabled} step={step} style={{ ...bs, paddingLeft: prefix ? 22 : 11 }} /></div>}
  </div>;
}
function Btn({ children, onClick, primary, danger, small, disabled, accent }) {
  return <button onClick={onClick} disabled={disabled} style={{ padding: small ? "5px 12px" : "8px 18px", borderRadius: 9, border: primary || accent ? "none" : danger ? "1.5px solid #f87171" : "1.5px solid #334155", background: primary ? "linear-gradient(135deg,#7c3aed,#a855f7)" : accent ? "linear-gradient(135deg,#0891b2,#22d3ee)" : "transparent", color: primary || accent ? "#fff" : danger ? "#f87171" : "#94a3b8", fontSize: small ? 11 : 12, fontFamily: "'DM Mono',monospace", fontWeight: 600, cursor: disabled ? "not-allowed" : "pointer", opacity: disabled ? 0.5 : 1 }}>{children}</button>;
}

// ─── Stock Snapshot Panel ───
function StockSnapshot({ clientName, snap, onUpdateSnap }) {
  const [expanded, setExpanded] = useState(false);
  const [sortBy, setSortBy] = useState("perdido");
  if (!clientName || (!clientName.toLowerCase().includes("pedidos") && !clientName.toLowerCase().includes("southbay"))) return null;
  if (!snap || !snap.categories || snap.categories.length === 0) return <div style={{padding:"12px 18px",background:"#0a1628",border:"1px solid #1e3a5f",borderRadius:13,fontSize:10,fontFamily:"'DM Mono',monospace",color:"#475569",marginBottom:20}}>📦 Foto de Stock · Sin datos cargados · <span style={{color:"#60a5fa",cursor:"pointer"}} onClick={onUpdateSnap}>📥 Cargar snapshot</span></div>;

  const isSB = clientName.toLowerCase().includes("southbay");
  const C = { purple: "#a855f7", rose: "#fb7185", emerald: "#34d399", amber: "#fbbf24", cyan: "#22d3ee", blue: "#60a5fa", orange: "#f97316" };
  const fmtN = n => (n != null && !isNaN(n)) ? Number(n).toLocaleString("es-AR") : "—";
  const fmtM = n => (n != null && !isNaN(n)) ? "$" + Math.abs(Number(n)).toLocaleString("es-AR", { minimumFractionDigits: 0, maximumFractionDigits: 0 }) : "$0";

  // ── Pedidos Ya mode ──
  const cats = !isSB ? (snap.categories || []).map(c => {
    const lost = Number(c.lost) || 0;
    const reubica = Number(c.reubica) || 0;
    const rotura = Number(c.rotura) || 0;
    const stock = Number(c.stock) || 0;
    const lostVal = Number(c.lostVal) || 0;
    const reubicaVal = Number(c.reubicaVal) || 0;
    const roturaVal = Number(c.roturaVal) || 0;
    const perdidoU = lost + reubica;
    const perdidoPct = stock > 0 ? (perdidoU / stock) * 100 : 0;
    const perdidoVal = lostVal + reubicaVal;
    const simAjusteVal = -(lostVal + reubicaVal + roturaVal);
    const excede = perdidoPct > snap.lostThreshold;
    return { ...c, stock, lost, reubica, rotura, lostVal, reubicaVal, roturaVal, perdidoU, perdidoPct, perdidoVal, simAjusteVal, excede };
  }) : [];

  const totStock = !isSB ? cats.reduce((s, c) => s + c.stock, 0) : (snap.categories || []).reduce((s, c) => s + (Number(c.stock)||0), 0);
  const totLost = !isSB ? cats.reduce((s, c) => s + c.lost, 0) : 0;
  const totReubica = !isSB ? cats.reduce((s, c) => s + c.reubica, 0) : 0;
  const totRotura = !isSB ? cats.reduce((s, c) => s + c.rotura, 0) : 0;
  const totPerdidoU = !isSB ? totLost + totReubica : 0;
  const totPerdidoPct = !isSB && totStock > 0 ? (totPerdidoU / totStock) * 100 : 0;
  const totPerdidoVal = !isSB ? cats.reduce((s, c) => s + c.perdidoVal, 0) : 0;
  const totSimAjusteVal = !isSB ? cats.reduce((s, c) => s + c.simAjusteVal, 0) : 0;
  const totExcede = !isSB ? totPerdidoPct > snap.lostThreshold : false;

  const sorted = !isSB ? [...cats].sort((a, b) =>
    sortBy === "perdido" ? b.perdidoPct - a.perdidoPct :
    sortBy === "stock" ? b.stock - a.stock :
    a.name.localeCompare(b.name)
  ) : [];

  // ── Southbay mode ──
  const sbCats = isSB ? (snap.categories || []).map(c => {
    const inc = Number(c.inc) || 0;
    const lost = Number(c.lost) || 0;
    const stock = Number(c.stock) || 0;
    const totPerd = inc + lost;
    const incPct  = stock > 0 ? (inc  / stock) * 100 : 0;
    const lostPct = stock > 0 ? (lost / stock) * 100 : 0;
    const totPerdPct = stock > 0 ? (totPerd / stock) * 100 : 0;
    const excede = totPerdPct > snap.lostThreshold;
    return { ...c, stock, inc, lost, totPerd, incPct, lostPct, totPerdPct, excede };
  }) : [];
  const sbTotStock  = isSB ? sbCats.reduce((s, c) => s + c.stock, 0) : 0;
  const sbTotInc    = isSB ? sbCats.reduce((s, c) => s + (c.inc || 0), 0) : 0;
  const sbTotLost   = isSB ? sbCats.reduce((s, c) => s + (c.lost || 0), 0) : 0;
  const sbTotPerd   = sbTotInc + sbTotLost;
  const sbTotPct    = sbTotStock > 0 ? (sbTotPerd / sbTotStock) * 100 : 0;
  const sbTotExcede = sbTotPct > snap.lostThreshold;
  const sbMaxPct    = isSB ? Math.max(...sbCats.map(c => c.totPerdPct), snap.lostThreshold * 1.5, 0.01) : 1;

  const maxPct = !isSB ? Math.max(...cats.map(c => c.perdidoPct), snap.lostThreshold * 1.5) : sbMaxPct;
  const displayExcede = isSB ? sbTotExcede : totExcede;
  const displayPct = isSB ? sbTotPct : totPerdidoPct;

  return (
    <div style={{ marginBottom: 20, background: "#0a1628", border: "1px solid #1e3a5f", borderRadius: 13, overflow: "hidden" }}>
      {/* Header */}
      <div onClick={() => setExpanded(e => !e)} style={{ padding: "12px 18px", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", background: "#0d1f3c", borderBottom: expanded ? "1px solid #1e3a5f" : "none" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 14 }}>📦</span>
          <span style={{ fontFamily: "'Space Grotesk',sans-serif", fontWeight: 600, fontSize: 13, color: "#e2e8f0" }}>Foto de Stock</span>
          <span style={{ fontSize: 9, fontFamily: "'DM Mono',monospace", color: "#64748b" }}>
            {snap.date} · {isSB ? "INC00101 + Lost" : "Lost + Reubica + Rotura"}
          </span>
          {displayExcede && <span style={{ fontSize: 8, padding: "2px 7px", borderRadius: 5, background: "#f8717120", color: "#f87171", fontFamily: "'DM Mono',monospace", fontWeight: 700 }}>⚠ SUPERA 1%</span>}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 8, color: "#64748b", fontFamily: "'DM Mono',monospace" }}>% STOCK PERDIDO</div>
            <div style={{ fontSize: 15, fontWeight: 700, fontFamily: "'Space Grotesk',sans-serif", color: displayExcede ? "#f87171" : "#34d399" }}>{displayPct.toFixed(3)}%</div>
          </div>
          {!isSB && <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 8, color: "#64748b", fontFamily: "'DM Mono',monospace" }}>SIM. IMPACTO $</div>
            <div style={{ fontSize: 15, fontWeight: 700, fontFamily: "'Space Grotesk',sans-serif", color: "#fb7185" }}>−{fmtM(Math.abs(totSimAjusteVal))}</div>
          </div>}
          {onUpdateSnap && <button onClick={e => { e.stopPropagation(); onUpdateSnap(); }} style={{ padding: "4px 11px", borderRadius: 7, border: "1px solid #1e3a5f", background: "transparent", color: "#60a5fa", fontSize: 9, fontFamily: "'DM Mono',monospace", fontWeight: 600, cursor: "pointer" }}>📥 Actualizar</button>}
          <span style={{ color: "#475569", fontSize: 14 }}>{expanded ? "▲" : "▼"}</span>
        </div>
      </div>

      {expanded && (
        <div style={{ padding: "16px 18px" }}>

          {/* ── SOUTHBAY MODE ── */}
          {isSB && (<>
            {/* KPI cards */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(148px, 1fr))", gap: 9, marginBottom: 16 }}>
              {[
                { l: "Stock Total", v: fmtN(sbTotStock) + " u.", s: "APP + FTW + EQP", c: C.blue },
                { l: "INC00101 Total", v: fmtN(sbTotInc) + " u.", s: "Pérdida contractual", c: C.rose },
                { l: "Lost Total", v: fmtN(sbTotLost) + " u.", s: "Transitoria operativa", c: C.amber },
                { l: "Perdido Total", v: fmtN(sbTotPerd) + " u.", s: "INC00101 + Lost", c: sbTotExcede ? C.rose : C.emerald },
                { l: "% Stock Perdido", v: sbTotPct.toFixed(3) + "%", s: `Umbral ≤ ${snap.lostThreshold}%`, c: sbTotExcede ? C.rose : C.emerald, alert: sbTotExcede },
              ].map((k, i) => (
                <div key={i} style={{ background: "#0f172a", border: k.alert ? "1.5px solid #f87171" : "1px solid #1e293b", borderRadius: 11, padding: "11px 14px" }}>
                  <div style={{ fontSize: 8, color: "#64748b", fontFamily: "'DM Mono',monospace", textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 3 }}>{k.l}</div>
                  <div style={{ fontSize: 15, fontWeight: 700, fontFamily: "'Space Grotesk',sans-serif", color: k.c }}>{k.v}</div>
                  <div style={{ fontSize: 8, color: "#475569", fontFamily: "'DM Mono',monospace", marginTop: 2 }}>{k.s}</div>
                </div>
              ))}
            </div>

            {/* Barra stacked INC + Lost por categoría */}
            <div style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 11, padding: "14px 16px", marginBottom: 14 }}>
              <div style={{ fontSize: 9, color: "#64748b", fontFamily: "'DM Mono',monospace", textTransform: "uppercase", marginBottom: 10 }}>
                INC00101 vs Lost por Cía — % sobre stock
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 8, fontSize: 8, fontFamily: "'DM Mono',monospace" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 4 }}><div style={{ width: 10, height: 10, borderRadius: 2, background: C.rose, opacity: 0.85 }} /><span style={{ color: "#94a3b8" }}>INC00101 (contractual)</span></div>
                <div style={{ display: "flex", alignItems: "center", gap: 4 }}><div style={{ width: 10, height: 10, borderRadius: 2, background: C.amber, opacity: 0.85 }} /><span style={{ color: "#94a3b8" }}>Lost (operativo)</span></div>
                <div style={{ display: "flex", alignItems: "center", gap: 4 }}><div style={{ width: 16, height: 2, background: "#f87171", opacity: 0.7 }} /><span style={{ color: "#f87171" }}>Umbral {snap.lostThreshold}%</span></div>
              </div>
              {sbCats.map(cat => {
                const incW  = Math.max((cat.incPct  / sbMaxPct) * 100, cat.inc > 0 ? 0.5 : 0);
                const lostW = Math.max((cat.lostPct / sbMaxPct) * 100, cat.lost > 0 ? 0.5 : 0);
                const thrW  = (snap.lostThreshold / sbMaxPct) * 100;
                return (
                  <div key={cat.name} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                    <div style={{ width: 40, fontSize: 9, color: "#94a3b8", fontFamily: "'DM Mono',monospace", textAlign: "right", flexShrink: 0, fontWeight: 600 }}>{cat.name}</div>
                    <div style={{ flex: 1, position: "relative", height: 18 }}>
                      {/* INC bar */}
                      <div style={{ position: "absolute", top: 3, left: 0, height: 12, width: `${incW}%`, background: C.rose, borderRadius: "3px 0 0 3px", opacity: 0.85 }} />
                      {/* Lost bar stacked */}

// ─── Proyección NC – Ajuste Acumulado + Impacto Snapshot ───
function ProyeccionNC({ clientName, catData, records, clients, selYr, periodRecs, periodMonths, isV, snap }) {
  const [expanded, setExpanded] = useState(true);
  const TOL_PROY = 0.001; // 0.1%
  const C = { purple: "#a855f7", rose: "#fb7185", emerald: "#34d399", amber: "#fbbf24", cyan: "#22d3ee", blue: "#60a5fa", orange: "#f97316" };
  const fmtN = n => (n != null && !isNaN(n)) ? Number(n).toLocaleString("es-AR") : "—";
  const fmtM = n => (n != null && !isNaN(n)) ? "$" + Math.abs(Number(n)).toLocaleString("es-AR", { minimumFractionDigits: 0, maximumFractionDigits: 0 }) : "$0";
  const fmtMS = n => { if (n == null || isNaN(n)) return "—"; const s = n < 0 ? "−" : n > 0 ? "+" : ""; return s + "$" + Math.abs(Number(n)).toLocaleString("es-AR", { minimumFractionDigits: 0, maximumFractionDigits: 0 }); };

  if (!clientName || !clientName.toLowerCase().includes("pedidos")) return null;

  if (!snap) return null;
  const clObj = clients.find(c => c.name.toLowerCase().includes("pedidos"));
  if (!clObj) return null;

  // Acumular $Ajuste y $OUT por categoría desde los registros del dashboard
  const clRecs = periodRecs(clObj.id, selYr, records);
  const adjByCat = {}, outByCat = {};
  clRecs.forEach(r => {
    const cat = (r.category && r.category !== "_total") ? r.category : null;
    if (!cat) return;
    if (!adjByCat[cat]) { adjByCat[cat] = 0; outByCat[cat] = 0; }
    adjByCat[cat] += r.costoAjuste || 0;
    outByCat[cat] += r.costoFlowOut || 0;
  });
  // Total $Ajuste y $OUT (registros _total o suma)
  const totAdjDash = clRecs.reduce((s, r) => s + (r.costoAjuste || 0), 0);
  const totOutDash  = clRecs.reduce((s, r) => s + (r.costoFlowOut || 0), 0);

  // Construir filas por categoría del snapshot
  const rows = snap.categories.map(sc => {
    const simImpacto = -(sc.lostVal + sc.reubicaVal + sc.roturaVal); // siempre negativo
    const adjDash    = adjByCat[sc.name] || 0;
    const outDash    = outByCat[sc.name] || 0;
    const adjProy    = adjDash + simImpacto;          // combinado
    const allowance  = TOL_PROY * Math.abs(outDash);  // 0.1% × $OUT
    const hasOut     = outDash > 0;

    let nc = 0, estado = "ok";
    if (adjProy >= 0) {
      estado = "positivo"; // favorable, sin penalidad
    } else if (!hasOut) {
      estado = "sin_out";  // no hay base para calcular allowance
    } else {
      const excedente = Math.abs(adjProy) - allowance;
      if (excedente > 0) { nc = excedente; estado = "nc"; }
      else { estado = "dentro_tol"; }
    }
    return { name: sc.name, adjDash, simImpacto, adjProy, outDash, allowance, nc, estado, hasOut };
  });

  // Totales generales (usando suma de _total o suma cruda)
  const totSimImpacto = snap.categories.reduce((s, c) => s - (c.lostVal + c.reubicaVal + c.roturaVal), 0);
  const totAdjProy    = totAdjDash + totSimImpacto;
  const totAllowance  = TOL_PROY * Math.abs(totOutDash);
  const totNC         = totAdjProy < 0 ? Math.max(0, Math.abs(totAdjProy) - totAllowance) : 0;
  const totEstado     = totAdjProy >= 0 ? "positivo" : totNC > 0 ? "nc" : "dentro_tol";

  const sumNCCats   = rows.reduce((s, r) => s + r.nc, 0); // suma de NC individuales por cat. (los valores rojos)

  const colorEstado = e => e === "positivo" ? C.emerald : e === "nc" ? C.rose : e === "dentro_tol" ? C.cyan : "#64748b";
  const labelEstado = e => e === "positivo" ? "✓ Favorable" : e === "nc" ? "⚠ NC Proy." : e === "dentro_tol" ? "✓ Dentro tol." : "Sin $OUT";

  const maxAbsAdj = Math.max(...rows.map(r => Math.abs(r.adjProy)), Math.abs(totAdjProy), 1);

  return (
    <div style={{ marginBottom: 20, background: "#0f1a2e", border: "1px solid #1e3a5f", borderRadius: 13, overflow: "hidden" }}>
      {/* Header colapsable */}
      <div
        onClick={() => setExpanded(e => !e)}
        style={{ padding: "12px 18px", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", background: "#0d1f3c", borderBottom: expanded ? "1px solid #1e3a5f" : "none" }}
      >
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 14 }}>🔮</span>
          <span style={{ fontFamily: "'Space Grotesk',sans-serif", fontWeight: 600, fontSize: 13, color: "#e2e8f0" }}>Proyección NC</span>
          <span style={{ fontSize: 9, fontFamily: "'DM Mono',monospace", color: "#64748b" }}>Ajuste acum. + Sim. Stock · Tol. 0,1% s/ $OUT</span>
          {totEstado === "nc" && <span style={{ fontSize: 8, padding: "2px 7px", borderRadius: 5, background: "#f8717120", color: "#f87171", fontFamily: "'DM Mono',monospace", fontWeight: 700 }}>⚠ NC PROYECTADA</span>}
          {totEstado === "positivo" && <span style={{ fontSize: 8, padding: "2px 7px", borderRadius: 5, background: "#34d39920", color: "#34d399", fontFamily: "'DM Mono',monospace", fontWeight: 700 }}>✓ FAVORABLE</span>}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 8, color: "#64748b", fontFamily: "'DM Mono',monospace" }}>ADJ. PROY. TOTAL</div>
            <div style={{ fontSize: 15, fontWeight: 700, fontFamily: "'Space Grotesk',sans-serif", color: totAdjProy >= 0 ? C.emerald : C.rose }}>{fmtMS(totAdjProy)}</div>
          </div>
          {sumNCCats > 0 && <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 8, color: "#64748b", fontFamily: "'DM Mono',monospace" }}>NC PROY. TOTAL</div>
            <div style={{ fontSize: 15, fontWeight: 700, fontFamily: "'Space Grotesk',sans-serif", color: C.rose }}>{fmtM(sumNCCats)}</div>
          </div>}
          <span style={{ color: "#475569", fontSize: 14 }}>{expanded ? "▲" : "▼"}</span>
        </div>
      </div>

      {expanded && (
        <div style={{ padding: "16px 18px" }}>
          {/* KPI resumen total */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(148px, 1fr))", gap: 9, marginBottom: 18 }}>
            {[
              { l: "Ajuste Acum. Dashboard", v: fmtMS(totAdjDash), c: totAdjDash >= 0 ? C.emerald : C.rose, s: "Σ $Ajuste registros" },
              { l: "Sim. Impacto Snapshot", v: fmtMS(totSimImpacto), c: C.rose, s: "Lost+Reubica+Rotura −$" },
              { l: "Ajuste Proyectado", v: fmtMS(totAdjProy), c: totAdjProy >= 0 ? C.emerald : C.rose, s: "Dashboard + Snapshot", alert: totAdjProy < 0 },
              { l: "Allowance Total (0,1%)", v: totOutDash > 0 ? fmtM(totAllowance) : "Sin $OUT", c: C.cyan, s: `0,1% × ${fmtM(Math.abs(totOutDash))}` },
              { l: "NC Proyectada", v: sumNCCats > 0 ? fmtM(sumNCCats) : "—", c: sumNCCats > 0 ? C.rose : C.emerald, s: sumNCCats > 0 ? "Σ excedentes por categoría" : "Dentro de tolerancia", alert: sumNCCats > 0 },
            ].map((k, i) => (
              <div key={i} style={{ background: "#0f172a", border: k.alert ? "1.5px solid #f87171" : "1px solid #1e293b", borderRadius: 11, padding: "11px 14px" }}>
                <div style={{ fontSize: 8, color: "#64748b", fontFamily: "'DM Mono',monospace", textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 3 }}>{k.l}</div>
                <div style={{ fontSize: 15, fontWeight: 700, fontFamily: "'Space Grotesk',sans-serif", color: k.c }}>{k.v}</div>
                <div style={{ fontSize: 8, color: "#475569", fontFamily: "'DM Mono',monospace", marginTop: 2 }}>{k.s}</div>
              </div>
            ))}
          </div>

          {/* Waterfall visual: dashboard → snapshot → proyectado */}
          <div style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 11, padding: "14px 16px", marginBottom: 16 }}>
            <div style={{ fontSize: 9, color: "#64748b", fontFamily: "'DM Mono',monospace", textTransform: "uppercase", marginBottom: 12 }}>Composición del Ajuste Proyectado por Categoría</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {/* header labels */}
              <div style={{ display: "grid", gridTemplateColumns: "150px 1fr 80px 80px 80px 90px", gap: 6, fontSize: 7, color: "#475569", fontFamily: "'DM Mono',monospace", textTransform: "uppercase", paddingBottom: 4, borderBottom: "1px solid #1e293b" }}>

                       : r.estado === "dentro_tol" ? <span style={{ color: C.cyan, fontSize: 8 }}>Dentro tol.</span>

              {/* Total row – NC es suma de los valores rojos individuales por categoría */}
              {(() => {

                  <div style={{ display: "grid", gridTemplateColumns: "150px 1fr 80px 80px 80px 90px", gap: 6, alignItems: "center", padding: "8px 0 2px 0", borderTop: "2px solid #1e293b", marginTop: 2 }}>

                    <div style={{ fontSize: 9, fontFamily: "'DM Mono',monospace", textAlign: "right", color: C.rose, fontWeight: 700 }}>{fmtMS(totSimImpacto)}</div>

                    <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 1 }}>

          <div style={{ background: "#1e293b20", border: "1px solid #1e293b", borderRadius: 9, padding: "10px 14px", fontSize: 9, fontFamily: "'DM Mono',monospace", color: "#475569", lineHeight: 1.6 }}>
            <span style={{ color: "#64748b", fontWeight: 600 }}>Metodología: </span>
            Ajuste Proyectado = $Ajuste acumulado (dashboard) + Simulación impacto snapshot (Lost+Reubica+Rotura en negativo).
            Allowance = 0,1% × $OUT acumulado por categoría. Si Ajuste Proyectado ≥ 0 → sin penalidad.
            Si negativo y |Ajuste Proyectado| &gt; Allowance → NC Proyectada = diferencia excedente.
            {!totOutDash && <span style={{ color: C.amber }}> ⚠ Sin registros de $OUT cargados en el dashboard: allowances en $0.</span>}

      )}
    </div>
  );
}

// ─── Proyección Penalidad Southbay ───
function ProyeccionSB({ clientName, records, clients, selYr, periodRecs, sbSnapshot }) {
  const [expanded, setExpanded] = useState(true);
  const TOL_SB = 0.00125; // 0,125%
  const C = { rose: "#fb7185", emerald: "#34d399", amber: "#fbbf24", cyan: "#22d3ee", blue: "#60a5fa", purple: "#a855f7" };
  const fmtN = n => (n != null && !isNaN(n)) ? Number(n).toLocaleString("es-AR") : "—";

  if (!clientName || !clientName.toLowerCase().includes("southbay")) return null;
  const clObj = clients.find(c => c.name.toLowerCase().includes("southbay"));
  if (!clObj) return null;

  // Ajuste acumulado por Cía desde los registros del dashboard
  const clRecs = records.filter(r => r.clientId === clObj.id && r.year === selYr);
  const adjByCia = {}, stByCia = {};
  clRecs.forEach(r => {
    const cat = (r.category && r.category !== "_total") ? r.category : null;
    if (!cat) return;
    if (!adjByCia[cat]) { adjByCia[cat] = 0; stByCia[cat] = 0; }
    adjByCia[cat] += r.ajuste || 0;
    stByCia[cat]  += Number(r.stockTeorico) || 0;
  });
  const totAdjDash = clRecs.reduce((s, r) => s + (r.ajuste || 0), 0);
  const totSTDash  = clRecs.reduce((s, r) => s + (Number(r.stockTeorico) || 0), 0);

  const getSTCia = cia => stByCia[cia] || 0;
  const getTotST = totSTDash;

  // Snapshot: INC + Lost por Cía (unidades simuladas a ajustar en negativo)
  const snapCats = (sbSnapshot && sbSnapshot.categories) ? sbSnapshot.categories : [];

  // Construir filas por Cía
  const cias = [...new Set([
    ...Object.keys(adjByCia),
    ...snapCats.map(c => c.name)
  ])].filter(Boolean);

  const rows = cias.map(cia => {
    const simImpacto  = -(Number((snapCats.find(c => c.name === cia) || {}).inc  || 0) +
                          Number((snapCats.find(c => c.name === cia) || {}).lost || 0));
    const adjDash     = adjByCia[cia] || 0;
    const stTeorico   = getSTCia(cia);
    const adjProy     = adjDash + simImpacto;          // unidades
    const allowance   = TOL_SB * stTeorico;            // 0,125% × Stock Teórico
    const hasST       = stTeorico > 0;
    const incU        = Number((snapCats.find(c => c.name === cia) || {}).inc  || 0);
    const lostU       = Number((snapCats.find(c => c.name === cia) || {}).lost || 0);

    let pen = 0, estado = "ok";
    if (adjProy >= 0) {
      estado = "positivo";
    } else if (!hasST) {
      estado = "sin_st";
    } else {
      const excedente = Math.abs(adjProy) - allowance;
      if (excedente > 0) { pen = excedente; estado = "pen"; }
      else { estado = "dentro_tol"; }
    }
    return { cia, adjDash, simImpacto, adjProy, stTeorico, allowance, pen, estado, hasST, incU, lostU };
  });

  const sumPenCias  = rows.reduce((s, r) => s + r.pen, 0);
  const totSimImpacto = rows.reduce((s, r) => s + r.simImpacto, 0);
  const totAdjProy    = totAdjDash + totSimImpacto;
  const totAllowance  = TOL_SB * getTotST;
  const totEstado     = totAdjProy >= 0 ? "positivo" : sumPenCias > 0 ? "pen" : "dentro_tol";
  const maxAbsAdj     = Math.max(...rows.map(r => Math.abs(r.adjProy)), Math.abs(totAdjProy), 1);

  return (
    <div style={{ marginBottom: 20, background: "#0f1a2e", border: "1px solid #1e3a5f", borderRadius: 13, overflow: "hidden" }}>
      {/* Header */}
      <div onClick={() => setExpanded(e => !e)} style={{ padding: "12px 18px", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", background: "#0d1f3c", borderBottom: expanded ? "1px solid #1e3a5f" : "none" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 14 }}>🔮</span>
          <span style={{ fontFamily: "'Space Grotesk',sans-serif", fontWeight: 600, fontSize: 13, color: "#e2e8f0" }}>Proyección Penalidad</span>
          <span style={{ fontSize: 9, fontFamily: "'DM Mono',monospace", color: "#64748b" }}>Ajuste acum. + Sim. INC+Lost · Tol. 0,125% s/ Stock Teórico</span>
          {totEstado === "pen"      && <span style={{ fontSize: 8, padding: "2px 7px", borderRadius: 5, background: "#f8717120", color: "#f87171", fontFamily: "'DM Mono',monospace", fontWeight: 700 }}>⚠ EXCEDE TOL.</span>}
          {totEstado === "positivo" && <span style={{ fontSize: 8, padding: "2px 7px", borderRadius: 5, background: "#34d39920", color: "#34d399", fontFamily: "'DM Mono',monospace", fontWeight: 700 }}>✓ FAVORABLE</span>}
          {totEstado === "dentro_tol" && <span style={{ fontSize: 8, padding: "2px 7px", borderRadius: 5, background: "#22d3ee20", color: "#22d3ee", fontFamily: "'DM Mono',monospace", fontWeight: 700 }}>✓ DENTRO TOL.</span>}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 8, color: "#64748b", fontFamily: "'DM Mono',monospace" }}>ADJ. PROY. TOTAL</div>
            <div style={{ fontSize: 15, fontWeight: 700, fontFamily: "'Space Grotesk',sans-serif", color: totAdjProy >= 0 ? C.emerald : C.rose }}>
              {totAdjProy >= 0 ? "+" : ""}{fmtN(totAdjProy)} u.
            </div>
          </div>
          {sumPenCias > 0 && <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 8, color: "#64748b", fontFamily: "'DM Mono',monospace" }}>EXCEDENTE TOTAL</div>
            <div style={{ fontSize: 15, fontWeight: 700, fontFamily: "'Space Grotesk',sans-serif", color: C.rose }}>{fmtN(Math.ceil(sumPenCias))} u.</div>
          </div>}
          <span style={{ color: "#475569", fontSize: 14 }}>{expanded ? "▲" : "▼"}</span>
        </div>
      </div>

      {expanded && (
        <div style={{ padding: "16px 18px" }}>
          {/* KPI cards */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(148px, 1fr))", gap: 9, marginBottom: 16 }}>
            {[
              { l: "Ajuste Acum. (u.)", v: (totAdjDash >= 0 ? "+" : "") + fmtN(totAdjDash) + " u.", c: totAdjDash >= 0 ? C.emerald : C.rose, s: "Registros cargados" },
              { l: "Sim. INC+Lost (u.)", v: fmtN(totSimImpacto) + " u.", c: C.rose, s: "INC00101 + Lost en negativo" },
              { l: "Ajuste Proyectado", v: (totAdjProy >= 0 ? "+" : "") + fmtN(totAdjProy) + " u.", c: totAdjProy >= 0 ? C.emerald : C.rose, s: "Acum. + Simulación", alert: totAdjProy < 0 },
              { l: "Stock Teórico", v: totSTDash > 0 ? fmtN(getTotST) + " u." : "Sin datos", c: totSTDash > 0 ? C.blue : "#475569", s: totSTDash > 0 ? "Suma acum. registros" : "Importá el archivo de ajustes" },
              { l: "Allowance (0,125%)", v: fmtN(Math.round(totAllowance)) + " u.", c: C.cyan, s: "0,125% × ST" },
              { l: "Excedente Total", v: sumPenCias > 0 ? fmtN(Math.ceil(sumPenCias)) + " u." : "—", c: sumPenCias > 0 ? C.rose : C.emerald, s: sumPenCias > 0 ? "Σ excedentes por Cía" : "Dentro de tolerancia", alert: sumPenCias > 0 },
            ].map((k, i) => (
              <div key={i} style={{ background: "#0f172a", border: k.alert ? "1.5px solid #f87171" : "1px solid #1e293b", borderRadius: 11, padding: "11px 14px" }}>
                <div style={{ fontSize: 8, color: "#64748b", fontFamily: "'DM Mono',monospace", textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 3 }}>{k.l}</div>
                <div style={{ fontSize: 15, fontWeight: 700, fontFamily: "'Space Grotesk',sans-serif", color: k.c }}>{k.v}</div>
                <div style={{ fontSize: 8, color: "#475569", fontFamily: "'DM Mono',monospace", marginTop: 2 }}>{k.s}</div>
              </div>
            ))}
          </div>

          {/* Tabla por Cía */}
          <div style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 11, padding: "12px 14px", marginBottom: 14, overflowX: "auto" }}>
            <div style={{ fontSize: 9, color: "#64748b", fontFamily: "'DM Mono',monospace", textTransform: "uppercase", marginBottom: 10 }}>Composición por Cía</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
              {/* Header */}
              <div style={{ display: "grid", gridTemplateColumns: "50px 1fr 90px 90px 90px 80px 90px 90px", gap: 6, fontSize: 7, color: "#475569", fontFamily: "'DM Mono',monospace", textTransform: "uppercase", paddingBottom: 6, borderBottom: "1px solid #1e293b", alignItems: "center" }}>
                <div>Cía</div><div>Ajuste Proyectado</div>
                <div style={{ textAlign: "right" }}>Adj.Acum.</div>
                <div style={{ textAlign: "right" }}>INC (u.)</div>
                <div style={{ textAlign: "right" }}>Lost (u.)</div>
                <div style={{ textAlign: "right" }}>ST</div>
                <div style={{ textAlign: "right" }}>Allowance</div>
                <div style={{ textAlign: "right" }}>Excedente</div>
              </div>
              {rows.map((r, i) => {
                const barW = Math.min((Math.abs(r.adjProy) / maxAbsAdj) * 100, 100);
                const isPos = r.adjProy >= 0;
                return (
                  <div key={r.cia} style={{ display: "grid", gridTemplateColumns: "50px 1fr 90px 90px 90px 80px 90px 90px", gap: 6, alignItems: "center", padding: "6px 0", borderBottom: "1px solid #0f172a" }}>
                    <div style={{ fontSize: 10, fontFamily: "'Space Grotesk',sans-serif", fontWeight: 700, color: r.estado === "pen" ? C.rose : "#e2e8f0" }}>
                      {r.estado === "pen" && "⚠ "}{r.cia}
                    </div>
                    <div style={{ position: "relative", height: 14 }}>
                      <div style={{ position: "absolute", top: 1, left: 0, height: 12, width: `${barW}%`, background: isPos ? "#34d39960" : r.estado === "pen" ? "#f8717160" : "#22d3ee50", borderRadius: 3 }} />
                    </div>
                    <div style={{ fontSize: 9, fontFamily: "'DM Mono',monospace", textAlign: "right", color: r.adjDash >= 0 ? C.emerald : C.rose }}>
                      {r.adjDash !== 0 ? (r.adjDash > 0 ? "+" : "") + fmtN(r.adjDash) : <span style={{ color: "#334155" }}>—</span>}
                    </div>
                    <div style={{ fontSize: 9, fontFamily: "'DM Mono',monospace", textAlign: "right", color: C.rose }}>
                      {r.incU > 0 ? "−" + fmtN(r.incU) : <span style={{ color: "#334155" }}>—</span>}
                    </div>
                    <div style={{ fontSize: 9, fontFamily: "'DM Mono',monospace", textAlign: "right", color: C.amber }}>
                      {r.lostU > 0 ? "−" + fmtN(r.lostU) : <span style={{ color: "#334155" }}>—</span>}
                    </div>
                    <div style={{ fontSize: 9, fontFamily: "'DM Mono',monospace", textAlign: "right", color: r.hasST ? C.blue : "#334155" }}>
                      {r.hasST ? fmtN(Math.round(r.stTeorico)) : "—"}
                    </div>
                    <div style={{ fontSize: 9, fontFamily: "'DM Mono',monospace", textAlign: "right", color: r.hasST ? C.cyan : "#334155" }}>
                      {r.hasST ? fmtN(Math.round(r.allowance)) : "—"}
                    </div>
                    <div style={{ fontSize: 9, fontFamily: "'DM Mono',monospace", textAlign: "right", fontWeight: 700 }}>
                      {r.estado === "pen"        ? <span style={{ color: C.rose }}>⚠ {fmtN(Math.ceil(r.pen))} u.</span>
                       : r.estado === "positivo" ? <span style={{ color: C.emerald, fontSize: 8 }}>Favorable</span>
                       : r.estado === "dentro_tol" ? <span style={{ color: C.cyan, fontSize: 8 }}>Dentro tol.</span>
                       : <span style={{ color: "#334155", fontSize: 8 }}>Sin ST</span>}
                    </div>
                  </div>
                );
              })}
              {/* Total row */}
              {(() => {
                const sumPen = rows.reduce((s, r) => s + r.pen, 0);
                return (
                  <div style={{ display: "grid", gridTemplateColumns: "50px 1fr 90px 90px 90px 80px 90px 90px", gap: 6, alignItems: "center", padding: "8px 0 2px 0", borderTop: "2px solid #1e293b", marginTop: 2 }}>
                    <div style={{ fontSize: 9, color: "#e2e8f0", fontFamily: "'DM Mono',monospace", fontWeight: 700 }}>TOTAL</div>
                    <div />
                    <div style={{ fontSize: 9, fontFamily: "'DM Mono',monospace", textAlign: "right", color: totAdjDash >= 0 ? C.emerald : C.rose, fontWeight: 700 }}>
                      {(totAdjDash > 0 ? "+" : "") + fmtN(totAdjDash)}
                    </div>
                    <div style={{ fontSize: 9, fontFamily: "'DM Mono',monospace", textAlign: "right", color: C.rose, fontWeight: 700 }}>
                      {"−" + fmtN(rows.reduce((s, r) => s + r.incU, 0))}
                    </div>
                    <div style={{ fontSize: 9, fontFamily: "'DM Mono',monospace", textAlign: "right", color: C.amber, fontWeight: 700 }}>
                      {"−" + fmtN(rows.reduce((s, r) => s + r.lostU, 0))}
                    </div>
                    <div style={{ fontSize: 9, fontFamily: "'DM Mono',monospace", textAlign: "right", color: C.blue, fontWeight: 700 }}>
                      {fmtN(Math.round(getTotST))}
                    </div>
                    <div style={{ fontSize: 9, fontFamily: "'DM Mono',monospace", textAlign: "right", color: C.cyan, fontWeight: 700 }}>
                      {fmtN(Math.round(totAllowance))}
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 1 }}>
                      {sumPen > 0
                        ? <><span style={{ fontSize: 11, fontFamily: "'Space Grotesk',sans-serif", fontWeight: 700, color: C.rose }}>⚠ {fmtN(Math.ceil(sumPen))} u.</span>
                            <span style={{ fontSize: 7, fontFamily: "'DM Mono',monospace", color: "#64748b" }}>Σ por Cía</span></>
                        : <span style={{ fontSize: 9, fontFamily: "'DM Mono',monospace", fontWeight: 700, color: C.emerald }}>Sin excedente</span>
                      }
                    </div>
                  </div>
                );
              })()}
            </div>
          </div>

          {/* Nota metodológica */}
          <div style={{ background: "#1e293b20", border: "1px solid #1e293b", borderRadius: 9, padding: "10px 14px", fontSize: 9, fontFamily: "'DM Mono',monospace", color: "#475569", lineHeight: 1.6 }}>
            <span style={{ color: "#64748b", fontWeight: 600 }}>Metodología: </span>
            Ajuste Proyectado = Ajuste acumulado (registros) − (INC00101 + Lost) del snapshot, en unidades por Cía.
            Allowance = 0,125% × Stock Teórico acumulado. Si Ajuste Proyectado ≥ 0 → sin penalidad.
            Si negativo y |Ajuste Proyectado| &gt; Allowance → Excedente = diferencia en unidades.
            {totSTDash === 0 && <span style={{ color: C.amber }}> ⚠ Sin Stock Teórico cargado. Ir a Datos → Southbay → 🗑 Limpiar → 📥 Importar el archivo de ajustes.</span>}
          </div>
        </div>
      )}
    </div>
  );
}

    });

                <div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ fontWeight: 600, fontSize: 13, fontFamily: "'Space Grotesk',sans-serif" }}>{c.name}</span>

                  <div style={{ fontSize: 10, color: "#64748b", fontFamily: "'DM Mono',monospace", marginTop: 3 }}>
                    {CALC_METHODS.find(m => m.id === c.method)?.label}
                    {c.useCategories && c.categories?.length > 0 && ` · ${c.categories.length} cat.`}
                    {c.tolDesvio > 0 && ` · Tol: ${c.tolDesvio}%`}

          </div>

        {/* ═══ DATOS ═══ */}
        {tab === "datos" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>

            </div>

                        <div>
                          <div style={{ fontWeight: 600, fontSize: 12, fontFamily: "'Space Grotesk',sans-serif", color: "#e2e8f0", marginBottom: 4 }}>{cl.name}</div>
                          <div style={{ fontSize: 10, fontFamily: "'DM Mono',monospace", color: "#64748b" }}>
                            {clR.length} registros

                                  <td style={{ padding: "4px 8px", color: "#94a3b8" }}>{MONTHS[r.month]} {r.year}</td>
                                  <td style={{ padding: "4px 8px", color: "#a855f7" }}>{r.category === "_total" ? "Total" : r.category}</td>
                                  <td style={{ padding: "4px 8px", textAlign: "right", color: r.ajuste < 0 ? "#fb7185" : "#34d399" }}>{fmt(r.ajuste)}</td>

                {s.i.map((x, j) => <div key={j} style={{ display: "flex", gap: 10, marginBottom: 4, fontSize: 11, fontFamily: "'DM Mono',monospace" }}><span style={{ color: "#64748b", minWidth: 70, flexShrink: 0 }}>{x.m}:</span><span style={{ color: "#94a3b8" }}>{x.f}</span></div>)}
              </div>

          </div>

            <p style={{ fontSize: 10, color: "#475569", fontFamily: "'DM Mono',monospace", marginTop: 6, marginBottom: 0 }}>Columnas: CLIENTE, MES, Categoría, Ajuste (Un.), $Ajuste, OUT (Un.), $OUT · Southbay: agregar columna Stock Teórico</p>
          </div>
          {impPrev && <div style={{ background: "#0f172a", borderRadius: 9, padding: "12px 14px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>

                <span style={{ fontSize: 9, color: "#64748b", fontFamily: "'DM Mono',monospace" }}>Duplicados:</span>
                {[["skip","Omitir"],["replace","Reemplazar"]].map(([v,l]) => (
                  <button key={v} onClick={() => setImpMode(v)} style={{ padding: "2px 9px", borderRadius: 5, border: impMode===v?"1.5px solid #a855f7":"1px solid #334155", background: impMode===v?"#a855f718":"transparent", color: impMode===v?"#a855f7":"#64748b", fontSize: 9, fontFamily:"'DM Mono',monospace", cursor:"pointer", fontWeight: impMode===v?600:400 }}>{l}</button>
                ))}
              </div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 4, fontSize: 10, fontFamily: "'DM Mono',monospace", color: "#94a3b8" }}>

              <div>Clientes: <span style={{ color: "#e2e8f0", fontWeight: 600 }}>{impPrev.clientNames.join(", ")}</span></div>
              <div>Períodos: <span style={{ color: "#e2e8f0", fontWeight: 600 }}>{impPrev.months.join(", ")}</span></div>
              <div>Valorizado: <span style={{ color: "#e2e8f0", fontWeight: 600 }}>{impPrev.hasValued ? "Sí" : "No"}</span></div>
            </div>
            {/* Period detection alerts */}

              const pd = impPrev.clientPeriods?.[name];

              return (
                <div key={name} style={{ marginTop: 8, padding: "8px 12px", background: "#22d3ee10", border: "1px solid #22d3ee30", borderRadius: 7, fontSize: 10, fontFamily: "'DM Mono',monospace" }}>

                </div>
              );
            })}
            <div style={{ marginTop: 10, display: "flex", justifyContent: "flex-end" }}><Btn primary onClick={execImport}>Confirmar importación</Btn></div>
          </div>}
          {impStat && <div style={{ padding: "8px 12px", borderRadius: 7, background: impStat.startsWith("✓") ? "#34d39918" : "#f8717118", color: impStat.startsWith("✓") ? C.emerald : C.rose, fontSize: 11, fontFamily: "'DM Mono',monospace" }}>{impStat}</div>}

          <div style={{ background: "#1e293b", borderRadius: 9, padding: "12px 14px" }}>
            <div style={{ fontSize: 10, color: "#94a3b8", fontFamily: "'DM Mono',monospace", fontWeight: 600, marginBottom: 8, textTransform: "uppercase" }}>Tolerancias (%)</div>
            <div style={{ display: "flex", gap: 8 }}><F label="Merma" value={cTD} onChange={setCTD} type="number" placeholder="0.10" step="0.01" /><F label="% Stock" value={cTS} onChange={setCTS} type="number" placeholder="—" step="0.01" /><F label="% Salidas" value={cTO} onChange={setCTO} type="number" placeholder="—" step="0.01" /></div>

            <div style={{ fontSize: 9, color: "#94a3b8", fontFamily: "'DM Mono',monospace", fontWeight: 600, marginBottom: 6, textTransform: "uppercase" }}>Inicio del período</div>
            <div style={{ display: "flex", gap: 8 }}><F label="Mes" value={cPSM} onChange={setCPSM} options={MONTHS.map((m, i) => ({ value: i.toString(), label: m }))} /><F label="Año" value={cPSY} onChange={setCPSY} options={[{ value: "prev", label: "Año anterior al cierre" }, { value: "same", label: "Mismo año del cierre" }]} /></div>
            <div style={{ fontSize: 9, color: "#475569", fontFamily: "'DM Mono',monospace", marginTop: 6 }}>Ej: Nov + año anterior → 2026 = Nov 2025 – Oct 2026</div>
          </div>}
          <label style={{ display: "flex", alignItems: "center", gap: 7, fontSize: 11, color: "#94a3b8", fontFamily: "'DM Mono',monospace", cursor: "pointer" }}><input type="checkbox" checked={cUseCat} onChange={e => setCUseCat(e.target.checked)} /> Mide por categorías</label>
          {cUseCat && <F label="Categorías (coma)" value={cCats} onChange={setCCats} placeholder="Ej: Beverages, Snacks" />}
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 6, marginTop: 6 }}><Btn onClick={() => setShowCM(false)}>Cancelar</Btn><Btn primary onClick={saveCl} disabled={!cn.trim()}>Guardar</Btn></div>
        </div>
      </Modal>

      <Modal open={showRM} onClose={() => setShowRM(false)} title={editRec ? "Editar Registro" : "Nuevo Registro"} width={560}>
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <div style={{ display: "flex", gap: 8 }}>
            <F label="Cliente" value={rCl} onChange={v => { setRCl(v); const cl = clients.find(c => c.id === v); if (cl) setRMt(cl.method); setRCat("_total"); }} options={clients.map(c => ({ value: c.id, label: c.name }))} />
            <F label="Año" value={rYr} onChange={v => setRYr(Number(v))} small options={YEARS.map(y => ({ value: y, label: y.toString() }))} />
            <F label="Mes" value={rMo} onChange={v => setRMo(Number(v))} small options={MONTHS.map((m, i) => ({ value: i, label: m }))} />
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <F label="Método" value={rMt} onChange={setRMt} options={CALC_METHODS.map(m => ({ value: m.id, label: m.label }))} />
            {(() => { const cl = clients.find(c => c.id === rCl); return cl?.useCategories && cl.categories?.length ? <F label="Categoría" value={rCat} onChange={setRCat} options={[{ value: "_total", label: "Total" }, ...cl.categories.map(c => ({ value: c, label: c }))]} /> : null; })()}
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <F label="Stock Real" value={rSt} onChange={setRSt} type="number" placeholder="0" />
            {(() => { const cl = clients.find(c => c.id === rCl); return cl?.method === "stock_teorico" ? <F label="Stock Teórico (CYC)" value={rST} onChange={setRST} type="number" placeholder="0" /> : <F label="Uds. IN" value={rIn} onChange={setRIn} type="number" placeholder="0" />; })()}
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            {(() => { const cl = clients.find(c => c.id === rCl); return cl?.method !== "stock_teorico" ? <F label="Uds. OUT" value={rOut} onChange={setROut} type="number" placeholder="0" /> : null; })()}
            <F label="Ajuste (u.)" value={rAdj} onChange={setRAdj} type="number" placeholder="0" />
          </div>
          {(() => { const cl = clients.find(c => c.id === rCl); return cl?.penaltyType === "valued" ? <div style={{ background: "#1e293b", borderRadius: 9, padding: "10px 14px" }}>
            <div style={{ fontSize: 9, color: C.cyan, fontFamily: "'DM Mono',monospace", fontWeight: 600, marginBottom: 6, textTransform: "uppercase" }}>Costos Reposición</div>
            <div style={{ display: "flex", gap: 8 }}><F label="$Ajuste (cto. repos. merma)" value={rCM} onChange={setRCM} type="number" prefix="$" step="0.01" /><F label="$OUT (cto. repos. flujo OUT)" value={rCF} onChange={setRCF} type="number" prefix="$" step="0.01" /></div>
          </div> : null; })()}
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 6, marginTop: 6 }}><Btn onClick={() => setShowRM(false)}>Cancelar</Btn><Btn primary onClick={saveRec}>Guardar</Btn></div>
        </div>
      </Modal>

           confirmDel?.t === "cl_records" ? `¿Limpiar los ${confirmDel.count} registros de ${confirmDel.name}? El cliente no se elimina, solo sus datos.` :
           "¿Eliminar registro?"}

          <Btn onClick={() => setConfirmDel(null)}>Cancelar</Btn>

          }}>Eliminar</Btn>
        </div>

      <Modal open={showSbSnapM} onClose={() => { setShowSbSnapM(false); setSbSnapPrev(null); setSbSnapStat(""); }} title="📦 Actualizar foto de stock – Southbay" width={620}>

          <div style={{ padding: "8px 12px", background: "#1e293b", borderRadius: 8, fontSize: 10, fontFamily: "'DM Mono',monospace", color: "#64748b" }}>
            Snapshot activo: <span style={{ color: "#e2e8f0", fontWeight: 600 }}>{sbSnapshot.date}</span> · <span style={{ color: "#e2e8f0", fontWeight: 600 }}>{sbSnapshot.categories.length} categorías</span>
          </div>
          <div style={{ background: "#1e293b", borderRadius: 9, padding: 14, border: "2px dashed #334155", textAlign: "center" }}>
            <input ref={sbSnapFileRef} type="file" accept=".xlsx,.xls" onChange={handleSbSnapFile} style={{ display: "none" }} />
            <Btn accent onClick={() => sbSnapFileRef.current?.click()}>Seleccionar Stock Southbay.xlsx</Btn>
            <p style={{ fontSize: 10, color: "#475569", fontFamily: "'DM Mono',monospace", marginTop: 6, marginBottom: 0 }}>Requiere columnas: <span style={{ color: "#94a3b8" }}>Tipo · Categoría · CANTIDAD · Total</span></p>
          </div>
          {sbSnapPrev && (
            <div style={{ background: "#0f172a", borderRadius: 9, padding: "14px 16px", border: "1px solid #22d3ee30" }}>
              <div style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", color: "#22d3ee", fontWeight: 600, marginBottom: 10 }}>✓ Archivo procesado — Preview</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, fontSize: 10, fontFamily: "'DM Mono',monospace", color: "#94a3b8", marginBottom: 12 }}>
                <div>Archivo: <span style={{ color: "#e2e8f0", fontWeight: 600 }}>{sbSnapPrev.filename}</span></div>
                <div>Filas: <span style={{ color: "#e2e8f0", fontWeight: 600 }}>{(sbSnapPrev.totalRows||0).toLocaleString("es-AR")}</span></div>
                <div>Categorías: <span style={{ color: "#e2e8f0", fontWeight: 600 }}>{sbSnapPrev.catCount}</span></div>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 4, maxHeight: 200, overflowY: "auto" }}>
                {sbSnapPrev.categories.map((cat, i) => {
                  const perdPct = cat.stock > 0 ? ((cat.lost + cat.reubica) / cat.stock * 100).toFixed(3) : "—";
                  return (
                    <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 70px 70px 70px 90px", gap: 6, fontSize: 9, fontFamily: "'DM Mono',monospace", padding: "4px 6px", background: "#1e293b20", borderRadius: 5, alignItems: "center" }}>
                      <div style={{ color: "#e2e8f0", fontWeight: 600 }}>{cat.name}</div>
                      <div style={{ textAlign: "right", color: "#64748b" }}>{(Number(cat.stock)||0).toLocaleString("es-AR")} u.</div>
                      <div style={{ textAlign: "right", color: "#fb7185" }}>Lost: {(Number(cat.lost)||0).toLocaleString("es-AR")}</div>
                      <div style={{ textAlign: "right", color: "#fbbf24" }}>Reub: {(Number(cat.reubica)||0).toLocaleString("es-AR")}</div>
                      <div style={{ textAlign: "right", color: "#94a3b8" }}>% perd: {perdPct}%</div>
                    </div>
                  );
                })}
              </div>
              <div style={{ marginTop: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontSize: 9, color: "#64748b", fontFamily: "'DM Mono',monospace" }}>Reemplaza snapshot de {sbSnapshot.date}</span>
                <Btn primary onClick={execSbSnapImport}>Confirmar e importar</Btn>
              </div>
            </div>
          )}
          {sbSnapStat && (
            <div style={{ padding: "8px 12px", borderRadius: 7, background: sbSnapStat.startsWith("✓") ? "#34d39918" : "#f8717118", color: sbSnapStat.startsWith("✓") ? "#34d399" : "#fb7185", fontSize: 11, fontFamily: "'DM Mono',monospace" }}>{sbSnapStat}</div>
          )}
        </div>
      </Modal>

      <Modal open={showSnapM} onClose={() => { setShowSnapM(false); setSnapPrev(null); setSnapStat(""); }} title="📦 Actualizar foto de stock" width={620}>
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <div style={{ padding: "8px 12px", background: "#1e293b", borderRadius: 8, fontSize: 10, fontFamily: "'DM Mono',monospace", color: "#64748b" }}>
            Snapshot activo: <span style={{ color: "#e2e8f0", fontWeight: 600 }}>{snapshot.date}</span> · <span style={{ color: "#e2e8f0", fontWeight: 600 }}>{snapshot.categories.length} categorías</span>
          </div>
          <div style={{ background: "#1e293b", borderRadius: 9, padding: 14, border: "2px dashed #334155", textAlign: "center" }}>
            <input ref={snapFileRef} type="file" accept=".xlsx,.xls" onChange={handleSnapFile} style={{ display: "none" }} />
            <Btn accent onClick={() => snapFileRef.current?.click()}>Seleccionar Stock.xlsx</Btn>
            <p style={{ fontSize: 10, color: "#475569", fontFamily: "'DM Mono',monospace", marginTop: 6, marginBottom: 0 }}>
              Requiere columnas: <span style={{ color: "#94a3b8" }}>Tipo · Categoría · CANTIDAD · Total</span>
            </p>
          </div>
          {snapPrev && (
            <div style={{ background: "#0f172a", borderRadius: 9, padding: "14px 16px", border: "1px solid #22d3ee30" }}>
              <div style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", color: "#22d3ee", fontWeight: 600, marginBottom: 10 }}>✓ Archivo procesado — Preview</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, fontSize: 10, fontFamily: "'DM Mono',monospace", color: "#94a3b8", marginBottom: 12 }}>
                <div>Archivo: <span style={{ color: "#e2e8f0", fontWeight: 600 }}>{snapPrev.filename}</span></div>
                <div>Filas totales: <span style={{ color: "#e2e8f0", fontWeight: 600 }}>{(snapPrev.totalRows||0).toLocaleString("es-AR")}</span></div>
                <div>Categorías: <span style={{ color: "#e2e8f0", fontWeight: 600 }}>{snapPrev.catCount}</span></div>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 4, maxHeight: 240, overflowY: "auto" }}>
                {snapPrev.categories.map((c, i) => {
                  const perdPct = c.stock > 0 ? ((c.lost + c.reubica) / c.stock * 100).toFixed(3) : "—";
                  const simVal = c.lostVal + c.reubicaVal + c.roturaVal;
                  return (
                    <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 70px 70px 70px 90px", gap: 6, fontSize: 9, fontFamily: "'DM Mono',monospace", padding: "4px 6px", background: "#1e293b20", borderRadius: 5, alignItems: "center" }}>
                      <div style={{ color: "#e2e8f0", fontWeight: 600 }}>{c.name}</div>
                      <div style={{ textAlign: "right", color: "#64748b" }}>{(Number(c.stock)||0).toLocaleString("es-AR")} u.</div>
                      <div style={{ textAlign: "right", color: "#fb7185" }}>Lost: {(Number(c.lost)||0).toLocaleString("es-AR")}</div>
                      <div style={{ textAlign: "right", color: "#fbbf24" }}>Reub: {(Number(c.reubica)||0).toLocaleString("es-AR")}</div>
                      <div style={{ textAlign: "right", color: "#94a3b8" }}>% perd: {perdPct}%</div>
                    </div>
                  );
                })}
              </div>
              <div style={{ marginTop: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontSize: 9, color: "#64748b", fontFamily: "'DM Mono',monospace" }}>Se reemplazará el snapshot de {snapshot.date}</span>
                <Btn primary onClick={execSnapImport}>Confirmar e importar</Btn>
              </div>
            </div>
          )}
          {snapStat && (
            <div style={{ padding: "8px 12px", borderRadius: 7, background: snapStat.startsWith("✓") ? "#34d39918" : "#f8717118", color: snapStat.startsWith("✓") ? "#34d399" : "#fb7185", fontSize: 11, fontFamily: "'DM Mono',monospace" }}>
              {snapStat}
            </div>
          )}
        </div>
      </Modal>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
